<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Expense Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="pb-20">

    <div class="bg-blue-600 text-white p-8 rounded-b-3xl shadow-lg mb-6">
        <h1 class="text-sm opacity-80 uppercase tracking-widest font-bold">Total Spent This Month</h1>
        <p id="total-amount" class="text-4xl font-bold mt-2">HK$ 0.00</p>
    </div>

    <div class="max-w-md mx-auto px-4">
        
        <div class="glass-card p-6 rounded-2xl shadow-sm mb-6">
            <h2 class="text-lg font-bold mb-4 text-gray-800">Add New Expense</h2>
            <form id="expense-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">AMOUNT (HKD)</label>
                    <input type="number" id="amount" step="0.1" required placeholder="0.00" class="w-full p-3 rounded-xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-500 outline-none text-lg">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">CATEGORY</label>
                        <select id="category" class="w-full p-3 rounded-xl border-none ring-1 ring-gray-200 outline-none bg-white">
                            <option>食物</option>
                            <option>交通</option>
                            <option>衣服</option>
                            <option>供樓</option>
                            <option>其他</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">SPENDER</label>
                        <input type="text" id="spender" placeholder="Name" class="w-full p-3 rounded-xl border-none ring-1 ring-gray-200 outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">DESCRIPTION</label>
                    <input type="text" id="description" placeholder="What did you buy?" class="w-full p-3 rounded-xl border-none ring-1 ring-gray-200 outline-none">
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-md active:scale-95 transition-transform">
                    Save Expense
                </button>
            </form>
        </div>

        <h2 class="text-lg font-bold mb-3 text-gray-800 px-2">Recent Activity</h2>
        <div id="expense-list" class="space-y-3">
            <p class="text-center text-gray-400 py-10">Loading expenses...</p>
        </div>
    </div>

    <script>
        // Use the credentials from your Supabase settings screenshots
        const SUPABASE_URL = 'https://apwgdjzwhnwjdbonaway.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwd2dkanp3aG53amRib25hd2F5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MzY2MjcsImV4cCI6MjA5MTAxMjYyN30._ZBC_NKIaUNQgzE2A4U3uw7cLy2_O6eshif7LzcIfLg';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('expense-form');
        const list = document.getElementById('expense-list');
        const totalDisplay = document.getElementById('total-amount');

        async function fetchExpenses() {
            const { data, error } = await supabaseClient
                .from('expenses')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Error fetching:', error);
                return;
            }
            renderExpenses(data);
        }

        function renderExpenses(expenses) {
            list.innerHTML = '';
            let total = 0;
            expenses.forEach(item => {
                total += parseFloat(item.amount);
                const div = document.createElement('div');
                div.className = 'glass-card p-4 rounded-xl flex justify-between items-center shadow-sm';
                div.innerHTML = `
                    <div>
                        <p class="font-bold text-gray-800">${item.category}</p>
                        <p class="text-xs text-gray-500">${item.description || 'No description'} • ${item.spender}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-blue-600">HK$ ${parseFloat(item.amount).toFixed(2)}</p>
                        <p class="text-[10px] text-gray-400">${new Date(item.created_at).toLocaleDateString()}</p>
                    </div>
                `;
                list.appendChild(div);
            });
            totalDisplay.innerText = `HK$ ${total.toFixed(2)}`;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newExpense = {
                amount: document.getElementById('amount').value,
                category: document.getElementById('category').value,
                spender: document.getElementById('spender').value,
                description: document.getElementById('description').value,
            };

            const { error } = await supabaseClient.from('expenses').insert([newExpense]);

            if (error) {
                alert('Error saving expense: ' + error.message);
            } else {
                form.reset();
                fetchExpenses();
            }
        });

        fetchExpenses();
    </script>
</body>
</html>
