<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Expense Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .section-header { border-left: 4px solid #2563eb; padding-left: 10px; margin: 20px 0 10px 0; font-weight: bold; color: #1e40af; }
    </style>
</head>
<body class="pb-20">

    <div class="bg-blue-600 text-white p-8 rounded-b-3xl shadow-lg mb-6 text-center">
        <h1 class="text-sm opacity-80 uppercase tracking-widest font-bold">Monthly Summary</h1>
        <p id="total-amount" class="text-4xl font-bold mt-2 text-white">HK$ 0.00</p>
    </div>

    <div class="max-w-2xl mx-auto px-4">
        <div class="glass-card p-6 rounded-2xl shadow-sm mb-8">
            <h2 class="text-lg font-bold mb-4 text-gray-800">Add New Record</h2>
            <form id="expense-form" class="space-y-4">
                <input type="hidden" id="edit-id">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">TYPE</label>
                        <select id="record-type" class="w-full p-3 rounded-xl ring-1 ring-gray-200 outline-none bg-white">
                            <option value="Expense">Expense</option>
                            <option value="Credit Card">Credit Card</option>
                            <option value="Income">Income</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">AMOUNT (HKD)</label>
                        <input type="number" id="amount" step="0.01" required placeholder="0.00" class="w-full p-3 rounded-xl ring-1 ring-gray-200 outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">CATEGORY</label>
                        <input type="text" id="category" placeholder="e.g. Food" class="w-full p-3 rounded-xl ring-1 ring-gray-200 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">SPENDER/SOURCE</label>
                        <input type="text" id="spender" placeholder="Name" class="w-full p-3 rounded-xl ring-1 ring-gray-200 outline-none">
                    </div>
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-md active:scale-95 transition-all">
                    Save Record
                </button>
            </form>
        </div>

        <div id="expense-sections">
            <div class="section-header">EXPENSES</div>
            <div id="list-Expense" class="space-y-2 mb-6 text-sm text-gray-400 italic">No expense records.</div>

            <div class="section-header">CREDIT CARDS</div>
            <div id="list-Credit Card" class="space-y-2 mb-6 text-sm text-gray-400 italic">No credit card records.</div>

            <div class="section-header">INCOME</div>
            <div id="list-Income" class="space-y-2 mb-6 text-sm text-gray-400 italic">No income records.</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://apwgdjzwhnwjdbonaway.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwd2dkanp3aG53amRib25hd2F5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MzY2MjcsImV4cCI6MjA5MTAxMjYyN30._ZBC_NKIaUNQgzE2A4U3uw7cLy2_O6eshif7LzcIfLg';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('expense-form');
        const totalDisplay = document.getElementById('total-amount');

        async function fetchRecords() {
            const { data, error } = await supabaseClient
                .from('expenses')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) { console.error(error); return; }
            renderList(data);
        }

        function renderList(records) {
            const types = ['Expense', 'Credit Card', 'Income'];
            let totalBalance = 0;

            types.forEach(type => {
                const container = document.getElementById(`list-${type}`);
                const filtered = records.filter(r => r.type === type || (!r.type && type === 'Expense'));
                
                if (filtered.length > 0) {
                    container.innerHTML = '';
                    container.classList.remove('italic', 'text-gray-400');
                }

                filtered.forEach(item => {
                    const amt = parseFloat(item.amount);
                    if (type === 'Income') totalBalance += amt;
                    else totalBalance -= amt;

                    const div = document.createElement('div');
                    div.className = 'glass-card p-4 rounded-xl flex justify-between items-center shadow-sm border-l-4 ' + (type === 'Income' ? 'border-green-500' : 'border-blue-500');
                    div.innerHTML = `
                        <div class="flex-1">
                            <p class="font-bold text-gray-800">${item.category || 'General'} <span class="text-xs font-normal text-gray-400 ml-2">${new Date(item.created_at).toLocaleDateString()}</span></p>
                            <p class="text-xs text-gray-500">${item.spender || 'Family'}</p>
                        </div>
                        <div class="text-right flex items-center gap-4">
                            <p class="font-bold ${type === 'Income' ? 'text-green-600' : 'text-gray-800'}">HK$ ${amt.toFixed(2)}</p>
                            <div class="flex gap-2">
                                <button onclick="editRecord('${item.id}', '${item.type}', ${amt}, '${item.category}', '${item.spender}')" class="text-blue-500 text-xs font-bold uppercase">Edit</button>
                                <button onclick="deleteRecord('${item.id}')" class="text-red-500 text-xs font-bold uppercase">Del</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(div);
                });
            });
            totalDisplay.innerText = `HK$ ${totalBalance.toFixed(2)}`;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const payload = {
                amount: document.getElementById('amount').value,
                type: document.getElementById('record-type').value,
                category: document.getElementById('category').value,
                spender: document.getElementById('spender').value
            };

            let res;
            if (id) {
                res = await supabaseClient.from('expenses').update(payload).eq('id', id);
            } else {
                res = await supabaseClient.from('expenses').insert([payload]);
            }

            if (res.error) alert(res.error.message);
            else {
                form.reset();
                document.getElementById('edit-id').value = '';
                document.getElementById('submit-btn').innerText = 'Save Record';
                fetchRecords();
            }
        });

        async function deleteRecord(id) {
            if (confirm('Delete this record?')) {
                const { error } = await supabaseClient.from('expenses').delete().eq('id', id);
                if (error) alert(error.message);
                else fetchRecords();
            }
        }

        function editRecord(id, type, amount, category, spender) {
            document.getElementById('edit-id').value = id;
            document.getElementById('record-type').value = type || 'Expense';
            document.getElementById('amount').value = amount;
            document.getElementById('category').value = category;
            document.getElementById('spender').value = spender;
            document.getElementById('submit-btn').innerText = 'Update Record';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        fetchRecords();
    </script>
</body>
</html>
